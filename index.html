<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Patchapapa Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a2e1a;
    --bg2:       #142214;
    --bg3:       #0e180e;
    --panel:     #1f3620;
    --plastic:   #2a4a2a;
    --border:    rgba(80,160,80,0.18);
    --accent:    #7ecf5a;
    --accent2:   #5aab36;
    --warn:      #f0c040;
    --text:      #e8f0e0;
    --muted:     #6a8a6a;
    --flat:      #4ab0ff;
    --sharp:     #ff6060;
    --in-tune:   #7ecf5a;
    --red-btn:   #cc2020;
    --red-btn2:  #ff3030;
    --chrome:    #c8d8c0;
    --meter-bg:  #0a1a0a;
    --meter-face:#e8e0c8;
  }

  body {
    background: var(--bg3);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 2rem;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(60,120,40,0.18) 0%, transparent 70%);
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: 0.9rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
    border-bottom: 2px solid rgba(60,120,40,0.4);
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    position: relative;
  }

  .logo-badge {
    background: var(--red-btn);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--chrome);
  }

  .header-model {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-left: auto;
  }

  /* ── MAIN ── */
  .main {
    width: 100%;
    max-width: 400px;
    padding: 0 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    margin-top: 1.2rem;
  }

  /* ── METER HOUSING ── */
  .meter-housing {
    width: 100%;
    background: var(--plastic);
    border-radius: 16px 16px 10px 10px;
    padding: 12px 12px 8px;
    box-shadow:
      0 4px 20px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(120,200,80,0.15),
      inset 0 -1px 0 rgba(0,0,0,0.4);
    border: 1px solid rgba(80,160,60,0.25);
    position: relative;
  }

  /* Rivets décoratifs */
  .meter-housing::before,
  .meter-housing::after {
    content: '';
    position: absolute;
    top: 10px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #9ab890, #3a5a3a);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
  }
  .meter-housing::before { left: 10px; }
  .meter-housing::after  { right: 10px; }

  /* Face du cadran */
  .meter-face {
    background: var(--meter-face);
    border-radius: 10px 10px 6px 6px;
    padding: 8px 8px 4px;
    box-shadow:
      inset 0 2px 8px rgba(0,0,0,0.25),
      0 1px 0 rgba(255,255,255,0.1);
    position: relative;
  }

  .meter-brand {
    text-align: center;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: #3a3020;
    text-transform: uppercase;
    margin-bottom: 2px;
    font-family: 'Oswald', sans-serif;
  }

  .meter-svg { width: 100%; display: block; }

  /* ── NOTE DISPLAY (inside face) ── */
  .note-display {
    text-align: center;
    padding: 2px 0 4px;
    background: var(--meter-face);
    border-radius: 0 0 6px 6px;
  }

  .note-big {
    font-size: 3.8rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.01em;
    transition: color 0.2s;
    font-family: 'Oswald', sans-serif;
    color: #2a2010;
  }

  .note-big.in-tune { color: #1a6010; }
  .note-big.flat    { color: #1040a0; }
  .note-big.sharp   { color: #a01010; }


  .freq-cents-row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: #5a4a30;
  }

  .cents-val { transition: color 0.2s; }
  .cents-val.in-tune { color: #1a6010; }
  .cents-val.off     { color: #a04010; }

  /* ── STRING BUTTONS ── */
  .section-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    align-self: flex-start;
    margin-bottom: -0.6rem;
  }

  .strings-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 7px;
    width: 100%;
  }

  .string-btn {
    background: radial-gradient(ellipse at 50% 30%, #2e4a2e, #0e1e0e);
    border: 1px solid rgba(80,160,60,0.3);
    border-radius: 8px;
    padding: 0.55rem 0.2rem;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(120,200,80,0.1);
  }

  .string-btn:active { transform: scale(0.94); }
  .string-btn.active {
    border-color: var(--accent);
    background: radial-gradient(ellipse at 50% 30%, #3a6020, #162010);
    box-shadow: 0 0 8px rgba(126,207,90,0.3), inset 0 1px 0 rgba(126,207,90,0.2);
  }

  .string-name {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--chrome);
  }

  .string-freq {
    font-size: 0.55rem;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
  }

  /* ── RED BUTTONS (sound mode) ── */
  .sound-mode {
    display: flex;
    gap: 10px;
    width: 100%;
    justify-content: center;
  }

  .mode-btn {
    flex: 1;
    padding: 0.6rem 0.4rem;
    border-radius: 50% / 40%;
    border: none;
    cursor: pointer;
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #ffcccc;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.12s;
    position: relative;
    /* Corps du bouton rouge */
    background: radial-gradient(ellipse at 40% 30%, #e03030, #801010);
    box-shadow:
      0 4px 0 #500808,
      0 5px 8px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,160,160,0.3);
  }

  .mode-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #500808, 0 3px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,160,160,0.2);
  }

  .mode-btn.active {
    background: radial-gradient(ellipse at 40% 30%, #ff5050, #cc1010);
    color: #fff;
    box-shadow:
      0 4px 0 #500808,
      0 5px 12px rgba(200,0,0,0.4),
      inset 0 1px 0 rgba(255,200,200,0.4);
  }

  /* Voyant LED sur bouton actif */
  .mode-btn.active::after {
    content: '';
    display: block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #ffee80;
    box-shadow: 0 0 6px #ffdd00;
    margin: 3px auto 0;
  }

  /* ── MIC BUTTON ── */
  .mic-btn-wrap { width: 100%; }

  #mic-btn {
    width: 100%;
    padding: 0.85rem;
    border-radius: 8px;
    border: 1px solid rgba(80,160,60,0.35);
    background: radial-gradient(ellipse at 50% 30%, #2a4a2a, #0e1e0e);
    color: var(--accent);
    font-family: 'Oswald', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(120,200,80,0.1);
    -webkit-tap-highlight-color: transparent;
  }

  #mic-btn:active { transform: scale(0.97); }
  #mic-btn.on {
    background: radial-gradient(ellipse at 50% 30%, #3a6020, #1a3010);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(126,207,90,0.25), 0 3px 8px rgba(0,0,0,0.4);
  }

  /* ── DBMETER ── */
  .dbmeter-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0.35;
    transition: opacity 0.3s;
  }

  .dbmeter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    width: 18px;
    text-align: right;
  }

  .dbmeter-track {
    flex: 1;
    height: 5px;
    background: rgba(0,0,0,0.4);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid rgba(80,160,60,0.2);
  }

  .dbmeter-bar {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 0.05s linear;
  }

  .dbmeter-bar.warn { background: var(--warn); }
  .dbmeter-bar.clip { background: var(--sharp); }

  .dbmeter-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    width: 40px;
  }

  /* ── STATUS ── */
  .status-bar {
    font-size: 0.62rem;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.07em;
    text-align: center;
  }

  .status-dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 5px;
    vertical-align: middle;
    transition: background 0.3s;
  }

  .status-dot.active  { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: pulse 1.5s infinite; }
  .status-dot.playing { background: var(--warn);   box-shadow: 0 0 5px var(--warn); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(80,160,60,0.25), transparent);
  }

  /* ── NEEDLE ── */
  #needle-group {
    transform-box: fill-box;
    transform-origin: 50% 100%;
    will-change: transform;
  }

  @keyframes glow-green {
    0%,100% { filter: drop-shadow(0 0 2px #7ecf5a); }
    50%      { filter: drop-shadow(0 0 7px #7ecf5a); }
  }
  .needle-in-tune { animation: glow-green 1s infinite; }
</style>
</head>
<body>

<header>
  <div class="logo-badge">AG-6</div>
  <h1>Guitar Tuner</h1>
  <span class="header-model" id="header-status">STANDBY</span>
</header>

<div class="main">

  <!-- METER HOUSING -->
  <div class="meter-housing">
    <div class="meter-face">
      <div class="meter-brand">Automatic Guitar Tuner</div>

      <svg class="meter-svg" viewBox="0 0 320 145" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <!-- Texture papier cadran -->
          <filter id="paper">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
            <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
            <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend"/>
            <feComposite in="blend" in2="SourceGraphic" operator="in"/>
          </filter>
        </defs>

        <!-- Fond cadran ivoire -->
        <rect x="0" y="0" width="320" height="145" rx="6" fill="#e8e0c0" filter="url(#paper)"/>

        <!-- Arcs colorés -->
        <path d="M 25 138 A 128 128 0 0 1 295 138" fill="none" stroke="#d8d0b0" stroke-width="10" stroke-linecap="round"/>
        <path d="M 25 138 A 128 128 0 0 1 91  35"  fill="none" stroke="#4080cc" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
        <path d="M 138 14 A 128 128 0 0 1 182 14"  fill="none" stroke="#208020" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
        <path d="M 229  35 A 128 128 0 0 1 295 138" fill="none" stroke="#cc3030" stroke-width="4" stroke-linecap="round" opacity="0.5"/>

        <!-- Graduations fines -->
        <g stroke="#5a4a30" stroke-linecap="round">
          <!-- Grands traits : -90 -72 -54 -36 -18 0 18 36 54 72 90 -->
          <line x1="25" y1="138" x2="33" y2="138" stroke-width="1.5" transform="rotate(-90 160 138)"/>
          <line x1="25" y1="138" x2="32" y2="138" stroke-width="1"   transform="rotate(-72 160 138)"/>
          <line x1="25" y1="138" x2="32" y2="138" stroke-width="1"   transform="rotate(-54 160 138)"/>
          <line x1="25" y1="138" x2="32" y2="138" stroke-width="1"   transform="rotate(-36 160 138)"/>
          <line x1="25" y1="138" x2="32" y2="138" stroke-width="1"   transform="rotate(-18 160 138)"/>
          <line x1="25" y1="138" x2="33" y2="138" stroke-width="1.5"/>
          <line x1="25" y1="138" x2="32" y2="138" stroke-width="1"   transform="rotate(18 160 138)"/>
          <line x1="25" y1="138" x2="32" y2="138" stroke-width="1"   transform="rotate(36 160 138)"/>

          <!-- Petits traits intermédiaires -->
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(-81 160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(-63 160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(-45 160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(-27 160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(-9  160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(9   160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(27  160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(45  160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(63  160 138)"/>
          <line x1="25" y1="138" x2="30" y2="138" stroke-width="0.8" transform="rotate(81  160 138)"/>
        </g>

        <!-- Labels ♭ ✓ ♯ -->
        <text x="16"  y="142" fill="#3060b0" font-size="12" font-family="serif" text-anchor="middle">♭</text>
        <text x="160" y="11"  fill="#1a6010" font-size="9"  font-family="Oswald,sans-serif" font-weight="600" text-anchor="middle" letter-spacing="1">IN TUNE</text>
        <text x="304" y="142" fill="#b02020" font-size="12" font-family="serif" text-anchor="middle">♯</text>

        <!-- Fréquences des cordes -->
        <text x="28"  y="128" fill="#3a3020" font-size="6.5" font-family="Share Tech Mono,monospace" text-anchor="middle">82</text>
        <text x="68"  y="90"  fill="#3a3020" font-size="6.5" font-family="Share Tech Mono,monospace" text-anchor="middle">110</text>

        <text x="212" y="58"  fill="#3a3020" font-size="6.5" font-family="Share Tech Mono,monospace" text-anchor="middle">196</text>

        <text x="292" y="128" fill="#3a3020" font-size="6.5" font-family="Share Tech Mono,monospace" text-anchor="middle">330</text>

        <!-- Aiguille -->
<g id="needle-group">

  <!-- Corps de l'aiguille -->

      points="158,138 162,138 160,26"

      cx="160"
      cy="138"
      r="10"
      fill="#252525"/>

  <!-- Bague métallique -->
  <circle
      cx="160"
      cy="138"
      r="7"
      fill="#5e5e5e"/>

  <!-- Vis centrale -->
  <circle
      cx="160"
      cy="138"
      r="2.5"
      fill="#d8d8d8"/>

</g>

</svg>

      <!-- Note & cents sur la face -->
      <div class="note-display">
        <div class="note-big" id="note-display">—</div>
        <div class="freq-cents-row">
          <span id="freq-display">— Hz</span>
          <span class="cents-val" id="cents-display">— ¢</span>
        </div>
      </div>
    </div>
  </div>

  <!-- STRINGS -->
  <div class="section-label">Écouter une corde</div>
  <div class="strings-grid" id="strings-grid"></div>

  <!-- SOUND MODE : boutons rouges -->
  <div class="sound-mode">
    <button class="mode-btn active" id="mode-sine"  onclick="setMode('sine')">Sinus</button>
    <button class="mode-btn"        id="mode-nylon" onclick="setMode('nylon')">Nylon</button>
    <button class="mode-btn"        id="mode-piano" onclick="setMode('piano')">Piano</button>
  </div>

  <div class="divider"></div>

  <!-- MIC -->
  <div class="mic-btn-wrap">
    <button id="mic-btn" onclick="toggleMic()">🎙 Activer le micro</button>
  </div>

  <!-- DBMETER -->
  <div class="dbmeter-wrap" id="dbmeter-wrap">
    <span class="dbmeter-label">IN</span>
    <div class="dbmeter-track">
      <div class="dbmeter-bar" id="dbmeter-bar"></div>
    </div>
    <span class="dbmeter-value" id="dbmeter-value">— dB</span>
  </div>

  <div class="status-bar">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Appuyez sur "Activer le micro" pour commencer</span>
  </div>

</div>

<script>
const STRINGS = [
  { name:'E2', display:'E', freq:82.41,  oct:'2' },
  { name:'A2', display:'A', freq:110.00, oct:'2' },
  { name:'D3', display:'D', freq:146.83, oct:'3' },
  { name:'G3', display:'G', freq:196.00, oct:'3' },
  { name:'B3', display:'B', freq:246.94, oct:'3' },
  { name:'E4', display:'E', freq:329.63, oct:'4' },
];
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

let audioCtx=null, analyser=null, micStream=null, rafId=null;
let micActive=false, soundMode='sine', playingNode=null, activeStringIdx=null;
let targetNeedleAngle = 0;
let currentNeedleAngle = 0;
let stableFreq = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

/* ── BUILD STRINGS ── */
function buildStrings() {
  const grid = document.getElementById('strings-grid');
  STRINGS.forEach((s,i) => {
    const btn = document.createElement('button');
    btn.className = 'string-btn';
    btn.id = 'str-'+i;
    btn.innerHTML = `<span class="string-name">${s.display}</span><span class="string-freq">${s.freq.toFixed(0)} Hz</span>`;
    btn.onclick = () => playString(i);
    grid.appendChild(btn);
  });
}

/* ── MODE ── */
function setMode(mode) {
  soundMode = mode;
  ['sine','nylon','piano'].forEach(m =>
    document.getElementById('mode-'+m).classList.toggle('active', m===mode));
  if (activeStringIdx!==null && playingNode) {
    stopPlayback();
    playString(activeStringIdx);
  }
}

/* ── PLAYBACK ── */
const FADE_OUT_MS = 160;

function stopPlayback(callback) {
  if (activeStringIdx!==null) {
    document.getElementById('str-'+activeStringIdx)?.classList.remove('active');
    activeStringIdx = null;
  }
  if (playingNode) {
    const node = playingNode; playingNode = null;
    try { node.stop(); } catch(e){}
    updateStatusDot();
    if (callback) setTimeout(callback, FADE_OUT_MS);
  } else {
    updateStatusDot();
    if (callback) callback();
  }
}

function playString(idx) {
  const ctx = getAudioCtx();
  if (soundMode==='sine' && activeStringIdx===idx && playingNode) { stopPlayback(); return; }
  const launch = () => {
    activeStringIdx = idx;
    document.getElementById('str-'+idx).classList.add('active');
    const freq = STRINGS[idx].freq;
    if      (soundMode==='sine')  playSine(ctx, freq);
    else if (soundMode==='piano') playPiano(ctx, freq);
    else                          playNylon(ctx, freq);
    updateStatusDot();
  };
  if (playingNode) { stopPlayback(launch); return; }
  stopPlayback(); launch();
}

/* ── BASS ENHANCER ──
   Pour les petites enceintes mobiles : ajoute 2e et 3e harmonique
   sur les fréquences < 200 Hz (E2, A2, D3) afin que le cerveau
   reconstitue la fondamentale manquante (technique "missing fundamental").
*/
function addBassEnhancer(ctx, sourceNode, freq, outputNode) {
  if (freq >= 200) {
    sourceNode.connect(outputNode);
    return;
  }
  // Quantité d'enhancement inversement proportionnelle à la fréquence
  const amount = Math.max(0, Math.min(0.7, (200 - freq) / 200));

  // Waveshaper doux → génère des harmoniques paires (2f, 4f…)
  const shaper = ctx.createWaveShaper();
  shaper.curve = makeHarmonicCurve(amount);
  shaper.oversample = '2x';

  // Gain de mélange
  const dryGain = ctx.createGain(); dryGain.gain.value = 1;
  const wetGain = ctx.createGain(); wetGain.gain.value = amount * 0.6;

  sourceNode.connect(dryGain);  dryGain.connect(outputNode);
  sourceNode.connect(shaper);   shaper.connect(wetGain); wetGain.connect(outputNode);
}

function makeHarmonicCurve(amount) {
  const n = 512;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i*2)/n - 1;
    // Soft clip asymétrique → produit des harmoniques paires et impaires
    curve[i] = x + amount * (Math.sin(Math.PI * x) * 0.3);
  }
  return curve;
}

/* ── SINE ── */
function playSine(ctx, freq) {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.45, ctx.currentTime + 0.02);
  // Bass enhance pour les graves
  addBassEnhancer(ctx, osc, freq, gain);
  // Note : osc déjà connecté dans addBassEnhancer
  gain.connect(ctx.destination);
  osc.start();
  playingNode = { stop: () => {
    const t = ctx.currentTime;
    gain.gain.setValueAtTime(gain.gain.value, t);
    gain.gain.linearRampToValueAtTime(0, t+0.15);
    setTimeout(()=>{ try{osc.stop();}catch(e){} }, 180);
  }};
}

/* ── NYLON ── */
function playNylon(ctx, freq) {
  const duration=7.0, fadeStart=3.5, fadeDuration=3.5;
  const sr = ctx.sampleRate;
  const N  = Math.round(sr/freq);
  const totalSamples = Math.round(sr*duration);
  const rawBuf = ctx.createBuffer(1, totalSamples, sr);
  const data   = rawBuf.getChannelData(0);

  const ring = new Float32Array(N);
  for (let i=0;i<N;i++) ring[i]=Math.random()*2-1;
  for (let p=0;p<4;p++) for (let i=1;i<N;i++) ring[i]=0.5*(ring[i]+ring[i-1]);

  const decay=0.9987, b=0.55;
  const fadeStartSample = Math.round(sr*fadeStart);
  for (let i=0;i<totalSamples;i++) {
    const cur=i%N, nxt=(i+1)%N;
    const raw=ring[cur];
    ring[cur]=decay*(b*ring[cur]+(1-b)*ring[nxt]);
    data[i] = i<fadeStartSample ? raw : raw*Math.max(0,1-(i-fadeStartSample)/(fadeDuration*sr));
  }

  const src  = ctx.createBufferSource(); src.buffer=rawBuf;
  const body = ctx.createBiquadFilter();
  body.type='peaking'; body.frequency.value=240; body.gain.value=7; body.Q.value=1.8;
  const hicut= ctx.createBiquadFilter();
  hicut.type='highshelf'; hicut.frequency.value=1800; hicut.gain.value=-6;
  const gainNode=ctx.createGain();
  gainNode.gain.setValueAtTime(0,ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.72,ctx.currentTime+0.008);

  // Bass enhance avant le filtre corps
  const preGain = ctx.createGain(); preGain.gain.value=1;
  addBassEnhancer(ctx, src, freq, preGain);
  preGain.connect(body); body.connect(hicut); hicut.connect(gainNode); gainNode.connect(ctx.destination);
  src.start();

  playingNode = { stop: ()=>{
    const t=ctx.currentTime;
    gainNode.gain.setValueAtTime(gainNode.gain.value,t);
    gainNode.gain.linearRampToValueAtTime(0,t+0.2);
    setTimeout(()=>{ try{src.stop();}catch(e){} },250);
  }};
  src.onended = ()=>{ if(activeStringIdx!==null){
    document.getElementById('str-'+activeStringIdx)?.classList.remove('active');
    activeStringIdx=null; playingNode=null; updateStatusDot();
  }};
}

/* ── PIANO ── */
function playPiano(ctx, freq) {
  const now = ctx.currentTime;
  const partials=[
    [1,1.00,6.0],[2,0.55,3.5],[3,0.28,2.2],
    [4,0.18,1.6],[5,0.10,1.1],[6,0.07,0.8],[7,0.04,0.5],
  ];
  const beta = 0.00015*Math.pow(440/freq,1.5);
  const masterGain=ctx.createGain();
  masterGain.gain.setValueAtTime(0,now);
  masterGain.gain.linearRampToValueAtTime(0.5,now+0.002);
  const body=ctx.createBiquadFilter();
  body.type='peaking'; body.frequency.value=Math.min(freq*2,800); body.gain.value=4; body.Q.value=1.2;

  const oscs=[];
  partials.forEach(([ratio,relGain,tau])=>{
    const f=freq*ratio*Math.sqrt(1+beta*ratio*ratio);
    const osc=ctx.createOscillator(), gNode=ctx.createGain();
    osc.type='sine'; osc.frequency.value=f;
    gNode.gain.setValueAtTime(relGain*0.85,now+0.002);
    gNode.gain.setTargetAtTime(0,now+0.002,tau);
    osc.connect(gNode); gNode.connect(masterGain);
    osc.start(now); osc.stop(now+tau*5);
    oscs.push(osc);
  });

  // Bass enhance sur le masterGain avant le filtre
  const preGain=ctx.createGain(); preGain.gain.value=1;
  masterGain.connect(preGain);
  // Pour piano on connecte directement (les harmoniques sont déjà présentes)
  preGain.connect(body); body.connect(ctx.destination);

  const totalDur=partials[0][2]*5;
  playingNode={ stop:()=>{
    const t=ctx.currentTime;
    masterGain.gain.setValueAtTime(masterGain.gain.value,t);
    masterGain.gain.linearRampToValueAtTime(0,t+0.08);
    oscs.forEach(o=>{ try{o.stop(t+0.1);}catch(e){} });
  }};
  setTimeout(()=>{
    if(activeStringIdx!==null&&soundMode==='piano'){
      document.getElementById('str-'+activeStringIdx)?.classList.remove('active');
      activeStringIdx=null; playingNode=null; updateStatusDot();
    }
  }, totalDur*1000);
}

/* ── MIC ── */
async function toggleMic() { micActive ? stopMic() : await startMic(); }

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    const ctx = getAudioCtx();
    await ctx.resume();
    micStream = stream;
    const source = ctx.createMediaStreamSource(stream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 4096;
    analyser.smoothingTimeConstant = 0.5;
    const micBoost=ctx.createGain(); micBoost.gain.value=8;
    const silent=ctx.createGain();   silent.gain.value=0;
    source.connect(micBoost); micBoost.connect(analyser);
    source.connect(silent);   silent.connect(ctx.destination);
    micActive=true;
    const btn=document.getElementById('mic-btn');
    btn.textContent='⏹ Couper le micro'; btn.classList.add('on');
    document.getElementById('header-status').textContent='LISTENING';
    document.getElementById('dbmeter-wrap').style.opacity='1';
    updateStatusDot(); detect();
  } catch(e) {
    setStatus('Accès micro refusé — '+e.message, false);
  }
}

function stopMic() {
  if(rafId) cancelAnimationFrame(rafId);
  if(micStream){ micStream.getTracks().forEach(t=>t.stop()); micStream=null; }
  analyser=null; micActive=false;
  const btn=document.getElementById('mic-btn');
  btn.textContent='🎙 Activer le micro'; btn.classList.remove('on');
  document.getElementById('header-status').textContent='STANDBY';
  document.getElementById('note-display').textContent='—';
  document.getElementById('freq-display').textContent='— Hz';
  document.getElementById('cents-display').textContent='— ¢';
  document.getElementById('note-display').className='note-big';
  document.getElementById('cents-display').className='cents-val';
  setNeedle(0);
  setStatus('Micro désactivé', false);
  const w=document.getElementById('dbmeter-wrap'); if(w) w.style.opacity='0.35';
  const b=document.getElementById('dbmeter-bar');  if(b){ b.style.width='0%'; b.className='dbmeter-bar'; }
  const v=document.getElementById('dbmeter-value'); if(v) v.textContent='— dB';
}

/* ── DETECT ── */
function detect() {
  if(!analyser) return;
  const buf=new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  let rms=0;
  for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/buf.length);
  updateDbMeter(rms);
  const freq=autocorrelate(buf,audioCtx.sampleRate);
if(freq>0){

  if(stableFreq===null){
    stableFreq=freq;
  }

  stableFreq =
    stableFreq * 0.85 +
    freq * 0.15;

  const {note,octave,cents} =
    freqToNote(stableFreq);

  updateDisplay(
    note,
    octave,
    stableFreq,
    cents
  );
}

rafId=requestAnimationFrame(detect);
}

function updateDbMeter(rms) {
  const bar=document.getElementById('dbmeter-bar');
  const val=document.getElementById('dbmeter-value');
  if(!bar||!val) return;
  if(rms<0.00001){ bar.style.width='0%'; val.textContent='— dB'; bar.className='dbmeter-bar'; return; }
  const db=20*Math.log10(rms);
  const pct=Math.max(0,Math.min(100,(db+80)/80*100));
  bar.style.width=pct+'%';
  val.textContent=db.toFixed(1)+' dB';
  bar.className='dbmeter-bar'+(db>-3?' clip':db>-12?' warn':'');
}

/* ── AUTOCORRELATION ── */
function autocorrelate(buf, sampleRate) {
  let rms=0;
  for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/buf.length);
  if(rms<0.001) return -1;
  let r1=0, r2=buf.length-1;
  const thr=0.2;
  for(let i=0;i<buf.length/2;i++){ if(Math.abs(buf[i])<thr){ r1=i; break; } }
  for(let i=1;i<buf.length/2;i++){ if(Math.abs(buf[buf.length-i])<thr){ r2=buf.length-i; break; } }
  const tr=buf.slice(r1,r2), n=tr.length;
  const c=new Float32Array(n);
  for(let i=0;i<n;i++) for(let j=0;j<n-i;j++) c[i]+=tr[j]*tr[j+i];
  let d=1; while(c[d]>c[d-1]) d++;
  let maxval=-1, maxpos=-1;
  for(let i=d;i<n;i++){ if(c[i]>maxval){ maxval=c[i]; maxpos=i; } }
  let T0=maxpos;
  const x1=c[T0-1],x2=c[T0],x3=c[T0+1];
  const a=(x1+x3-2*x2)/2, bv=(x3-x1)/2;
  if(a) T0=T0-bv/(2*a);
  return sampleRate/T0;
}

function freqToNote(freq) {
  const A4=440, semi=12*Math.log2(freq/A4), rounded=Math.round(semi);
  const noteIdx=((rounded%12)+12+9)%12;
  const octave=Math.floor((rounded+69)/12);
  const cents=Math.round((semi-rounded)*100);
  return {note:NOTES[noteIdx],octave,cents};
}

/* ── DISPLAY ── */
function updateDisplay(note,octave,freq,cents) {
  const noteEl=document.getElementById('note-display');
  const freqEl=document.getElementById('freq-display');
  const centsEl=document.getElementById('cents-display');
  noteEl.textContent = note;
  freqEl.textContent=freq.toFixed(1)+' Hz';
  centsEl.textContent=(cents>0?'+':'')+cents+' ¢';
  const abs=Math.abs(cents);
  if(abs<=5){
    noteEl.className='note-big in-tune';
    centsEl.className='cents-val in-tune';
  } else if(cents<0){
    noteEl.className='note-big flat';
    centsEl.className='cents-val off';
  } else {
    noteEl.className='note-big sharp';
    centsEl.className='cents-val off';
  }
targetNeedleAngle = cents * 0.9;
}

function animateNeedle() {

  const g = document.getElementById('needle-group');

  targetNeedleAngle =
    Math.max(-90, Math.min(90, targetNeedleAngle));

  const delta =
    targetNeedleAngle - currentNeedleAngle;

currentNeedleAngle += delta * 0.06;

  g.style.transform =
    `rotate(${currentNeedleAngle}deg)`;

  if (Math.abs(currentNeedleAngle) < 5) {
    g.classList.add('needle-in-tune');
  } else {
    g.classList.remove('needle-in-tune');
  }

  requestAnimationFrame(animateNeedle);
}

function updateStatusDot() {
  const dot=document.getElementById('status-dot');
  const txt=document.getElementById('status-text');
  if(playingNode||activeStringIdx!==null){
    dot.className='status-dot playing';
    txt.textContent='Lecture : '+(activeStringIdx!==null?STRINGS[activeStringIdx].name:'');
  } else if(micActive){
    dot.className='status-dot active';
    txt.textContent='Micro actif — jouez une note';
  } else {
    dot.className='status-dot';
    txt.textContent='Appuyez sur "Activer le micro" pour commencer';
  }
}

function setStatus(msg,active) {
  document.getElementById('status-text').textContent=msg;
  document.getElementById('status-dot').className='status-dot'+(active?' active':'');
}

buildStrings();
animateNeedle();
</script>
